{% extends "base.html" %}

{% block title %}
Ganti Password
{% endblock %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <h2 class="change-password-title">
            🔒 Ganti Password
        </h2>

        <form method="POST">

            <div class="form-group">

                <label>Password Lama</label>

                <input
                    type="password"
                    name="old_password"
                    required>

            </div>

            <div class="form-group">

                <label>Password Baru</label>

                <input
                    type="password"
                    name="new_password"
                    required>

            </div>

            <div class="form-group">

                <label>Konfirmasi Password Baru</label>

                <input
                    type="password"
                    name="confirm_password"
                    required>

            </div>

            <div class="button-group">

            <a
                href="{{ url_for('diagnosa.dashboard') }}"
                class="back-btn">

                ← Kembali ke Dashboard

            </a>

            <button
                type="submit"
                class="save-btn">

                Simpan

            </button>

        </form>

    </div>

</div>

{% endblock %}
