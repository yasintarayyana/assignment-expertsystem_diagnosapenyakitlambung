{% extends "base.html" %}

{% block title %}
Edit Profil
{% endblock %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <h1>Edit Profil</h1>

        <form method="POST">

            <div class="form-group">

                <label>Nama</label>

                <input
                    type="text"
                    name="nama"
                    value="{{ user.nama }}"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    required>

            </div>

            <div class="form-group">

                <label>Tanggal Lahir</label>
                <input
                    type="date"
                    name="tanggal_lahir"
                    value="{{ user.tanggal_lahir.strftime('%Y-%m-%d') }}"
                    required>

            </div>

            <div class="form-group">

                <label>Jenis Kelamin</label>
                <select
                    name="jenis_kelamin"
                    required>

                    <option value="Laki-laki"
                        {% if user.jenis_kelamin == 'Laki-laki' %}
                        selected
                        {% endif %}>
                        Laki-laki
                    </option>

                    <option value="Perempuan"
                        {% if user.jenis_kelamin == 'Perempuan' %}
                        selected
                        {% endif %}>
                        Perempuan
                    </option>

                </select>

            </div>

            <div class="button-group">

                <a href="{{ url_for('auth.profile') }}"
                   class="cancel-btn">

                    Batal

                </a>

                <button
                    type="submit"
                    class="save-btn">

                    Simpan

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
