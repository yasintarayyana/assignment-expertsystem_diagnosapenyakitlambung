{% extends 'base.html' %}

{% block content %}

<div class="detail-card">

    <h1>
        {{ data.disease_name }}
    </h1>

    <h3>Gejala</h3>

    <p>
        {{ data.symptoms }}

    <h3>Hasil Diagnosa</h3>

    <p>
        {{ data.description }}

    <p>
        {{ data.created_at }}
    </p>

</div>

{% endblock %}
