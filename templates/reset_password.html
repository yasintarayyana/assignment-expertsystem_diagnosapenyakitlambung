{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1>
            Password Baru
        </h1>

        <form method="POST">

          <div class="form-group">
              <label for="password_baru">
                  Password Baru
              </label>
            <input
                type="password"
                id="password_baru"
                name="password"
                placeholder="Password baru"
                required
            >
          </div>

          <div class="form-group">
              <label for="confirm_password">
                  Konfirmasi Password
              </label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Konfirmasi password"
                style="margin-bottom: 10px;"
                required
            >

            <button type="submit">
                Simpan Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
