{% extends "base.html" %}

{% block title %}
Data Diri
{% endblock %}

{% block content %}

<div class="test-profile-container">

    <!-- STEPPER -->

    <div class="stepper">

        <div class="step completed">
            <div class="step-circle">✓</div>
            <span>Panduan</span>
        </div>

        <div class="step-line active"></div>

        <div class="step active">
            <div class="step-circle">2</div>
            <span>Data Diri</span>
        </div>

        <div class="step-line"></div>

        <div class="step">
            <div class="step-circle">3</div>
            <span>Diagnosa</span>
        </div>

        <div class="step-line"></div>

        <div class="step">
            <div class="step-circle">4</div>
            <span>Hasil</span>
        </div>

    </div>

    <div class="profile-form-card">

        <h1>👤 Data Diri</h1>

        <p>
            Silakan lengkapi data diri berikut sebelum memulai proses diagnosa.
        </p>

        <div class="checkbox-section">

            <label>

                <input
                    type="checkbox"
                    id="useProfile"
                    checked>

                Gunakan Data Saya

            </label>

        </div>

        <form>

            <div class="form-group">

                <label>Nama Lengkap *</label>

                <input
                    type="text"
                    id="nama">

            </div>

            <div class="form-group">

                <label>Tanggal Lahir *</label>

                <input
                    type="date"
                    id="tanggal_lahir">

            </div>

            <div class="form-group">

                <label>Usia *</label>

                <input
                    type="number"
                    id="umur"
                    readonly>

            </div>

            <div class="form-group">

                <label>Email *</label>

                <input
                    type="email"
                    id="email">

            </div>

            <div class="form-group">

                <label>Jenis Kelamin *</label>

                <div class="radio-group">

                    <label>
                        <input
                            type="radio"
                            name="jk"
                            value="Laki-laki">
                        Laki-laki
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="jk"
                            value="Perempuan">
                        Perempuan
                    </label>

                </div>

            </div>

            <div class="form-group">

                <label>
                    Riwayat Penyakit Lambung Sebelumnya
                </label>

                <div class="checkbox-list">

                    <label>
                        <input type="checkbox">
                        Gastritis (Maag)
                    </label>

                    <label>
                        <input type="checkbox">
                        GERD
                    </label>

                    <label>
                        <input type="checkbox">
                        Tukak Lambung
                    </label>

                    <label>
                        <input type="checkbox">
                        Dispepsia
                    </label>

                    <label>
                        <input type="checkbox">
                        Tidak Memiliki Riwayat
                    </label>

                </div>

            </div>

            <div class="confirmation-box">

                <label>

                    <input
                        type="checkbox"
                        id="confirmData">

                    Saya menyatakan bahwa data yang saya masukkan benar.

                </label>

            </div>

            <div class="button-row">

                <a
                    href="{{ url_for('diagnosa.guidelines') }}"
                    class="back-btn">

                    ← Kembali

                </a>

                <a
                    href="{{ url_for('diagnosa.quiz') }}"
                    id="startBtn"
                    class="start-btn disabled">

                    Mulai Diagnosa →

                </a>

            </div>

        </form>

    </div>

</div>

<script>

const profileData = {
    nama: "{{ user.nama }}",
    email: "{{ user.email }}",
    tanggal_lahir:
        "{{ user.tanggal_lahir.strftime('%Y-%m-%d') if user.tanggal_lahir else '' }}",
    jenis_kelamin:
        "{{ user.jenis_kelamin }}",
    umur:
        "{{ user.umur }}"
};

const useProfile =
document.getElementById(
    "useProfile"
);

function fillProfile(){

    document.getElementById(
        "nama"
    ).value =
    profileData.nama;

    document.getElementById(
        "email"
    ).value =
    profileData.email;

    document.getElementById(
        "tanggal_lahir"
    ).value =
    profileData.tanggal_lahir;

    document.getElementById(
        "umur"
    ).value =
    profileData.umur;

    document
    .querySelector(
        `input[value="${profileData.jenis_kelamin}"]`
    )
    ?.setAttribute(
        "checked",
        true
    );
}

function clearProfile(){

    document.getElementById(
        "nama"
    ).value = "";

    document.getElementById(
        "email"
    ).value = "";

    document.getElementById(
        "tanggal_lahir"
    ).value = "";

    document.getElementById(
        "umur"
    ).value = "";

    document
    .querySelectorAll(
        'input[name="jk"]'
    )
    .forEach(
        radio => radio.checked = false
    );
}

fillProfile();

useProfile.addEventListener(
    "change",
    function(){

        if(this.checked){

            fillProfile();

        }else{

            clearProfile();

        }
    }
);

document
.getElementById(
    "confirmData"
)
.addEventListener(
    "change",
    function(){

        document
        .getElementById(
            "startBtn"
        )
        .classList.toggle(
            "disabled",
            !this.checked
        );
    }
);

</script>

{% endblock %}
