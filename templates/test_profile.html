{% extends "base.html" %}

{% block title %}
Data Diri
{% endblock %}

{% block content %}

<div class="test-profile-container">

    <!-- STEPPER -->

    <div class="stepper">

        <div class="step completed">
            <div class="step-circle">✓</div>
            <span>Panduan</span>
        </div>

        <div class="step-line active"></div>

        <div class="step active">
            <div class="step-circle">2</div>
            <span>Data Diri</span>
        </div>

        <div class="step-line active"></div>

        <div class="step">
            <div class="step-circle">3</div>
            <span>Riwayat Keluhan</span>
        </div>

        <div class="step-line"></div>

        <div class="step">
            <div class="step-circle">4</div>
            <span>Gejala</span>
        </div>

        <div class="step-line"></div>

        <div class="step">
            <div class="step-circle">5</div>
            <span>Hasil</span>
        </div>

    </div>

    <div class="profile-form-card">

        <h1>👤 Data Diri</h1>

        <p>
            Silakan lengkapi data diri berikut sebelum memulai proses diagnosa.
        </p>

        <div class="checkbox-section">

            <label>

                <input
                    type="checkbox"
                    id="useProfile"
                    checked>

                Gunakan Data Saya

            </label>

        </div>

<form>

    <div class="form-grid">

        <div class="form-group">
            <label>Nama Lengkap *</label>
            <input type="text" id="nama" placeholder="Nama Lengkap">
        </div>

        <div class="form-group">
            <label>Jenis Kelamin *</label>
            <select id="jk" name="jk" required>
                <option value="">Pilih Jenis Kelamin</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tanggal Lahir *</label>
            <input type="date" id="tanggal_lahir" name="tanggal_lahir" placeholder="Tanggal Lahir">
        </div>

        <div class="form-group">
            <label>Usia *</label>
            <input type="number" id="umur" name="usia" readonly placeholder="Usia">
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
            <label>Email *</label>
            <input type="email" id="email" name="email" placeholder="Email">
        </div>

    </div>

            <div class="confirmation-box">

                <label>

                    <input
                        type="checkbox"
                        id="confirmData">

                    Saya menyatakan bahwa data yang saya masukkan benar.

                </label>

            </div>

            <div class="button-row">

                <a
                    href="{{ url_for('diagnosa.guidelines') }}"
                    class="back-btn">

                    ← Kembali

                </a>

                <a
                    href="{{ url_for('diagnosa.onset') }}"
                    id="startBtn"
                    class="start-btn disabled">

                    Lanjut →

                </a>

            </div>

        </form>

    </div>

</div>

<script>
window.profileData = {
    nama: "{{ user.nama or '' }}",
    email: "{{ user.email or '' }}",
    tanggal_lahir:
        "{{ user.tanggal_lahir.strftime('%Y-%m-%d') if user.tanggal_lahir else '' }}",
    jenis_kelamin:
        "{{ user.jenis_kelamin or '' }}",
    umur:
        "{{ user.umur or '' }}"
};
</script>

<script src="{{ url_for('static', filename='js/test_profile.js') }}"></script>

{% endblock %}
