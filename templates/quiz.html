{% extends 'base.html' %}

{% block content %}

<div class="quiz-wrapper">

      <!-- STEPPER -->

    <div class="stepper">

        <div class="step completed">
            <div class="step-circle">✓</div>
            <span>Panduan</span>
        </div>

        <div class="step-line active"></div>

        <div class="step completed">
            <div class="step-circle">✓</div>
            <span>Data Diri</span>
        </div>

        <div class="step-line active"></div>

        <div class="step completed">
            <div class="step-circle">✓</div>
            <span>Riwayat Keluhan</span>
        </div>

        <div class="step-line"></div>

        <div class="step active">
            <div class="step-circle">4</div>
            <span>Gejala</span>
        </div>

        <div class="step-line"></div>

        <div class="step">
            <div class="step-circle">5</div>
            <span>Hasil</span>
        </div>

    </div>
    
    <div class="quiz-top">

        <h1>

            Tes Gejala
            Penyakit Lambung

        </h1>

    </div>

    <form
    method="POST"
    action="/quiz">

    {% for kode,
    nama in gejala.items() %}

    <div
    class="question-card">

        <div
        class="question-title">

            {{ loop.index }}.

            {{ nama }}

        </div>

        <div
        class="answer-group">

            <label
            class="answer-item">

                <input
                type="radio"

                name="{{ kode }}"

                value="0"

                checked>

                <span>

                    Tidak

                </span>

            </label>


            <label
            class="answer-item">

                <input
                type="radio"

                name="{{ kode }}"

                value="0.4">

                <span>

                    Sedikit

                </span>

            </label>


            <label
            class="answer-item">

                <input
                type="radio"

                name="{{ kode }}"

                value="0.6">

                <span>

                    Cukup

                </span>

            </label>


            <label
            class="answer-item">

                <input
                type="radio"

                name="{{ kode }}"

                value="0.8">

                <span>

                    Yakin

                </span>

            </label>


            <label
            class="answer-item">

                <input
                type="radio"

                name="{{ kode }}"

                value="1.0">

                <span>

                    Sangat
                    Yakin

                </span>

            </label>

        </div>

    </div>

    {% endfor %}

<!-- BUTTON -->

            <div class="button-row">

                <a
                    href="{{ url_for('diagnosa.test_profile') }}"
                    class="back-btn">

                    ← Kembali

                </a>

                <button
                    type="submit"
                    class="start-btn">

                    Lanjut →

                </button>

            </div>

    </form>

</div>

<script src="{{ url_for('static', filename='js/quiz.js') }}"></script>

{% endblock %}
