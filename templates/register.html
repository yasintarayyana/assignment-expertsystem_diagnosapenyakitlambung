<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">

    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-left">

        <h1>
            Sistem Pakar
            Penyakit Lambung
        </h1>

        <p>
            Buat akun baru
            untuk mulai diagnosa
            penyakit lambung
        </p>

    </div>


    <div class="auth-card">

        <h2>
            Register
        </h2>

        <p>
            Buat akun baru
        </p>

        <form method="POST">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

            <input
            type="email"
            name="email"
            placeholder="Email"
            required>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <input
            type="password"
            name="confirm_password"
            placeholder="Konfirmasi Password"
            required>

            <button type="submit">
                Register
            </button>

        </form>

        <div class="auth-link">

            Sudah punya akun?

            <a href="/login">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
