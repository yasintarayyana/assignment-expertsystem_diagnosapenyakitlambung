{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1>Login</h1>

        <p>
            Masuk ke akun Anda
        </p>

        <form
            method="POST"
            action="{{ url_for('auth.login') }}"
        >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-links">

            <a
                href="{{ url_for('auth.register') }}"
            >
                Belum punya akun?
            </a>

            <a
                href="/forgot-password"
            >
                Forgot Password
            </a>

        </div>

    </div>

</div>

{% endblock %}
