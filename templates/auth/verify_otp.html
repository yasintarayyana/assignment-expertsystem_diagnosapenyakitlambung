{% extends "base.html" %}

{% block title %}
Verifikasi OTP
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card otp-card">

        <div class="otp-icon">
            ✉️
        </div>

        <h1>
            Verifikasi Email
        </h1>

        <p>
            Masukkan kode OTP yang telah dikirim ke email Anda
        </p>

        <form
            method="POST"
            action="{{ url_for('auth.verify') }}"
        >

        <div class="form-group">
            <label for="otp">
                Kode OTP
            </label>

            <input
                type="text"
                id="otp"
                name="otp"
                placeholder="Masukkan 6 Digit OTP"
                maxlength="6"
                required
            >
        </div>

            <button type="submit">
                Verifikasi
            </button>

        </form>

        <div class="auth-links center-link">

            <a
                href="{{ url_for('auth.login') }}"
            >
                Kembali Masuk Akun
            </a>

        </div>

    </div>

</div>

{% endblock %}
