{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1>Daftar Akun</h1>

        <form
            method="POST"
            action="{{ url_for('auth.register') }}"
        >
<div class="form-row">
            <!-- NAMA -->
            <div class="form-group">
                <label for="nama">
                    Nama Lengkap
                </label>

            <input
                type="text"
                name="nama"
                placeholder="Nama Lengkap"
                required
            >
            </div>

            <!-- JENIS KELAMIN -->
            <div class="form-group">
                <label for="jenis_kelamin">
                    Jenis Kelamin
                </label>

            <select
                id="jenis_kelamin"
                name="jenis_kelamin"
                required
            >

                <option value="">
                    Pilih Jenis Kelamin
                </option>

                <option value="Laki-laki">
                    Laki-laki
                </option>

                <option value="Perempuan">
                    Perempuan
                </option>

            </select>
            </div>
</div>

            <!-- TANGGAL LAHIR -->
<div class="form-row">
            <div class="form-group">
                <label for="tanggal_lahir">
                    Tanggal Lahir
                </label>

            <input
                type="date"
                id="tanggal_lahir"
                name="tanggal_lahir"
                required
            >
            </div>

            <!-- UMUR AUTO -->
            <div class="form-group">
                <label for="umur">
                    Umur
                </label>

            <input
                type="number"
                id="umur"
                placeholder="Umur"
                readonly
            >
            </div>
</div>

            <!-- EMAIL -->
            <div class="form-group">
                <label for="email">
                    Email
                </label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Email"
                required
            >
            </div>

            <!-- PASSWORD -->
            <div class="form-group">
                <label for="password">
                    Password
                </label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
            >
            </div>

            <button type="submit">
                Daftar
            </button>

        </form>

        <div class="auth-links">

            <a
                href="{{ url_for('auth.login') }}"
            >
                Sudah punya akun? Masuk Akun.
            </a>

        </div>

    </div>

</div>


<!-- HITUNG UMUR OTOMATIS -->
<script>

document
.getElementById(
    "tanggal_lahir"
)
.addEventListener(
    "change",
    function(){

        const birthDate =
        new Date(
            this.value
        )

        const today =
        new Date()

        let age =
            today.getFullYear()
            -
            birthDate.getFullYear()

        const monthDiff =
            today.getMonth()
            -
            birthDate.getMonth()

        if(
            monthDiff < 0
            ||
            (
                monthDiff === 0
                &&
                today.getDate()
                <
                birthDate.getDate()
            )
        ){
            age--
        }

        document
        .getElementById(
            "umur"
        )
        .value = age
    }
)

</script>

{% endblock %}
